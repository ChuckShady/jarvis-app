<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>JARVIS</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#0a0e17">
<style>
:root {
    --bg: #0a0e17;
    --panel: #111827;
    --panel2: #0d1117;
    --cyan: #00d4ff;
    --cyan-dim: #00d4ff55;
    --cyan-faint: #00d4ff22;
    --text: #d7e2ec;
    --dim: #7a8ba0;
    --green: #26a69a;
    --red: #ef5350;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
}
#header {
    padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--cyan-faint);
    background: var(--panel2);
    flex: none;
}
#header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 2.2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
#header h1 {
    font-family: 'Courier New', monospace;
    font-size: 17px; letter-spacing: 4px;
    color: var(--cyan); font-weight: bold;
}
#header .sub { margin-left: auto; font-size: 11px; color: var(--dim); font-family: 'Courier New', monospace; }
.page { position: absolute; top: 0; bottom: 0; left: 0; right: 0; display: none; flex-direction: column; }
.page.active { display: flex; }
#pages { flex: 1; position: relative; min-height: 0; }
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }
#faceCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: .55; z-index: 0; }
#chatLog, #chatBar { position: relative; z-index: 1; }
#chatLog { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 6px; }
.msg { max-width: 86%; padding: 9px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 15px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { background: var(--cyan-faint); border: 1px solid var(--cyan-dim); margin-left: auto; border-bottom-right-radius: 3px; }
.msg.jarvis { background: var(--panel); border: 1px solid #1e2a3a; border-bottom-left-radius: 3px; }
.msg.jarvis b { color: var(--cyan); }
.msg.thinking { color: var(--dim); font-style: italic; }
#chatBar {
    display: flex; gap: 8px; padding: 8px 12px;
    background: var(--panel2); border-top: 1px solid var(--cyan-faint);
}
#chatInput {
    flex: 1; background: var(--panel); color: var(--text);
    border: 1px solid #1e2a3a; border-radius: 20px;
    padding: 10px 14px; font-size: 16px; outline: none;
}
#chatInput:focus { border-color: var(--cyan-dim); }
#sendBtn {
    background: var(--cyan); color: #04121a; border: none;
    border-radius: 20px; padding: 0 18px; font-weight: bold; font-size: 15px;
}
#sendBtn:disabled { opacity: .4; }
.card {
    background: var(--panel); border: 1px solid #1e2a3a;
    border-radius: 12px; padding: 14px; margin-bottom: 12px;
}
.card h2 {
    font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 2px; color: var(--cyan); margin-bottom: 10px; font-weight: bold;
}
.big { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; }
.pnl { font-size: 16px; font-weight: 600; margin-top: 2px; }
.up { color: var(--green); } .down { color: var(--red); }
.dimtxt { color: var(--dim); font-size: 12px; margin-top: 4px; }
canvas { width: 100%; height: 90px; }
.trow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #16202e; font-size: 13px; }
.trow:last-child { border-bottom: none; }
.trow .d { color: var(--dim); width: 58px; flex-shrink: 0; font-family: 'Courier New', monospace; }
.chips { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; }
.chip { width: 16px; height: 16px; border-radius: 4px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.chip.W { background: #26a69a33; color: var(--green); border: 1px solid #26a69a66; }
.chip.L { background: #ef535033; color: var(--red); border: 1px solid #ef535066; }
.chip.B { background: #7a8ba033; color: var(--dim); border: 1px solid #7a8ba066; }
.trow .p { font-weight: 600; font-variant-numeric: tabular-nums; }
.alert { border-color: var(--cyan-dim); }
.alert .t { font-size: 15px; font-weight: 600; line-height: 1.35; }
.alert .s { color: var(--dim); font-size: 12px; margin-top: 6px; }
#briefBody { font-size: 14px; line-height: 1.55; }
#briefBody h1, #briefBody h2 { font-family: 'Courier New', monospace; color: var(--cyan); font-size: 13px; letter-spacing: 1px; margin: 14px 0 6px; }
#briefBody h1:first-child { margin-top: 0; }
#briefBody li { margin-left: 18px; margin-bottom: 4px; }
#tabs {
    flex: none;
    display: flex;
    background: var(--panel2); border-top: 1px solid var(--cyan-faint);
    padding-bottom: env(safe-area-inset-bottom);
}
.tab {
    flex: 1; text-align: center; padding: 10px 0 8px;
    color: var(--dim); font-size: 11px; font-family: 'Courier New', monospace; letter-spacing: 1px;
}
.tab .ico { font-size: 19px; display: block; margin-bottom: 2px; }
.tab.active { color: var(--cyan); }
.offline { text-align: center; color: var(--dim); font-size: 12px; padding: 8px; display: none; }
</style>
</head>
<body>

<div id="header">
    <div class="dot" id="headerDot"></div>
    <h1 id="headerTitle">J.A.R.V.I.S</h1>
    <button id="bellBtn" title="Enable phone alerts" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;margin-left:auto;padding:4px 8px">🔔</button>
    <div class="sub" id="clock"></div>
</div>

<div id="pages">
    <div class="page active" id="page-chat">
        <canvas id="faceCanvas"></canvas>
        <div id="chatLog">
            <div class="msg jarvis" id="greeting">Good day, sir. Away-mode link active.</div>
        </div>
        <form id="chatBar" action="#">
            <input id="chatInput" type="text" placeholder="Ask JARVIS..." autocomplete="off" enterkeyhint="send">
            <button id="sendBtn" type="submit">➤</button>
        </form>
    </div>

    <div class="page" id="page-markets">
        <div class="scroll">
            <div class="offline" id="mOffline"></div>
            <div class="card" id="card-portfolio">
                <h2>PORTFOLIO</h2>
                <div class="big" id="equity">—</div>
                <div class="pnl" id="dayPnl"></div>
                <div class="dimtxt" id="asOf"></div>
                <canvas id="spark" height="90"></canvas>
            </div>
            <div class="card" id="card-tally">
                <h2>TRADE TALLY</h2>
                <div id="tally"></div>
            </div>
        </div>
    </div>

    <div class="page" id="page-brief">
        <div class="scroll">
            <div class="offline" id="bOffline"></div>
            <div class="card alert" id="alertCard" style="display:none">
                <h2>⚡ BREAKING</h2>
                <div class="t" id="alertTitle"></div>
                <div class="s" id="alertMeta"></div>
            </div>
            <div class="card" id="card-brief">
                <h2>LATEST BRIEF</h2>
                <div class="dimtxt" id="briefWhen" style="margin:0 0 8px"></div>
                <div id="briefBody">Loading...</div>
            </div>
        </div>
    </div>
</div>

<div id="tabs">
    <div class="tab active" data-page="chat"><span class="ico">◈</span>CHAT</div>
    <div class="tab" data-page="markets"><span class="ico">▲</span>MARKETS</div>
    <div class="tab" data-page="brief"><span class="ico">☰</span>BRIEF</div>
</div>

<script>
// ---------------- one-tap setup + resilient config store ----------------
// Config (GitHub token, Groq key, sync key) arrives once via the #setup link.
// We keep it in localStorage AND mirror it into the Cache API, which survives
// far better on an installed iOS app. If localStorage ever gets wiped, we
// self-heal from the Cache copy so the user NEVER has to re-run setup or
// re-add the app to the home screen.
var CFG_CACHE = 'jarvis-cfg-v1';
var CFG_URL = './__jarvis_cfg__';
function backupCfg(jsonStr) {
    try {
        if (!('caches' in window)) return;
        caches.open(CFG_CACHE).then(function (c) {
            c.put(CFG_URL, new Response(jsonStr, { headers: { 'Content-Type': 'application/json' } }));
        });
    } catch (e) {}
}
(function () {
    if (location.hash.indexOf('#setup=') === 0) {
        try {
            var raw = atob(decodeURIComponent(location.hash.slice(7)));
            var blob = JSON.parse(raw);
            if (blob && blob.gh && blob.user) {
                localStorage.setItem('jarvis_cfg', raw);
                backupCfg(raw);
            }
        } catch (e) {}
        // Never clear the hash — keeping it means iOS saves the URL WITH the
        // config when the user adds to home screen, so every launch auto-configures.
    }
})();
var CFG = JSON.parse(localStorage.getItem('jarvis_cfg') || 'null');
if (CFG) { backupCfg(JSON.stringify(CFG)); }
// Self-heal: if config is missing but we have a Cache backup, restore it and
// reload once so the whole app comes up properly configured.
if (!CFG && 'caches' in window && !sessionStorage.getItem('jarvis_cfg_tried')) {
    sessionStorage.setItem('jarvis_cfg_tried', '1');
    caches.open(CFG_CACHE).then(function (c) {
        return c.match(CFG_URL);
    }).then(function (resp) {
        if (resp) return resp.text().then(function (t) {
            if (t && t.indexOf('"gh"') !== -1) { localStorage.setItem('jarvis_cfg', t); location.reload(); }
        });
    }).catch(function () {});
}
// Auto-configure silently when on home WiFi — fetches fresh config from Mac
// every time the app opens at home, so setup never needs to be repeated.
(function autoConfigFromMac() {
    var MAC = 'http://192.168.1.236:8790';
    fetch(MAC + '/api/cfg', { signal: AbortSignal.timeout ? AbortSignal.timeout(3000) : undefined })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
            if (!d || !d.gh || !d.user) return;
            var raw = JSON.stringify(d);
            localStorage.setItem('jarvis_cfg', raw);
            backupCfg(raw);
            if (!CFG) location.reload(); // first time — reload so app boots with config
        })
        .catch(function() {}); // silently fail when not on home WiFi
})();

// ---------------- phone push alerts (iOS home-screen app) ----------------
var PUSH_VAPID_PUBLIC = "BKgekxmu2q8Y4LR8BEDHkFvCP3q9yaCY11-od1fv4cJjU1aFFJM3rivkDQJDFLhGBSm2a4_zMPJ3zxzDoZIYIuA";
function urlB64ToUint8(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var raw = atob(base64);
    var out = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
}
function b64(str) { return btoa(unescape(encodeURIComponent(str))); }
async function enableAlerts() {
    var bell = document.getElementById('bellBtn');
    try {
        if (!CFG || !CFG.gh || !CFG.user) { alert("Open this app on your home Wi-Fi once first, sir, so I have what I need."); return; }
        if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
            alert("This iPhone/browser can't do web notifications, sir. Needs iOS 16.4+ and the app added to your Home Screen."); return;
        }
        var perm = await Notification.requestPermission();
        if (perm !== 'granted') { alert("Notifications weren't allowed, sir."); return; }
        var reg = await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.getSubscription();
        if (!sub) {
            sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8(PUSH_VAPID_PUBLIC) });
        }
        // Store the subscription in the private jarvis-data repo so the Mac can push to it.
        var api = "https://api.github.com/repos/" + CFG.user + "/jarvis-data/contents/push_sub.json";
        var existing = await fetch(api + "?ref=main", { headers: { Authorization: "token " + CFG.gh, Accept: "application/vnd.github+json" } }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; });
        var body = { message: "jarvis push subscription", content: b64(JSON.stringify(sub)), branch: "main" };
        if (existing && existing.sha) body.sha = existing.sha;
        var put = await fetch(api, { method: "PUT", headers: { Authorization: "token " + CFG.gh, "Content-Type": "application/json", Accept: "application/vnd.github+json" }, body: JSON.stringify(body) });
        if (put.ok) { localStorage.setItem('jarvis_alerts_on', '1'); if (bell) bell.style.color = 'var(--cyan)'; alert("Alerts on, sir. I'll buzz you for big news, breaking alerts and large P/L swings — even when the app's closed."); }
        else { alert("Couldn't register alerts, sir (" + put.status + ")."); }
    } catch (e) { alert("Alerts setup failed, sir — " + (e && e.message ? e.message : e)); }
}
document.addEventListener('DOMContentLoaded', function () {
    var bell = document.getElementById('bellBtn');
    if (bell) {
        if (localStorage.getItem('jarvis_alerts_on') === '1') bell.style.color = 'var(--cyan)';
        bell.addEventListener('click', enableAlerts);
    }
});

// ---------------- service worker (works here: https) ----------------
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function () {});
}

// ---------------- tabs / clock / markdown ----------------
document.querySelectorAll('.tab').forEach(function (t) {
    t.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.page').forEach(function (x) { x.classList.remove('active'); });
        t.classList.add('active');
        document.getElementById('page-' + t.dataset.page).classList.add('active');
    });
});
function tick() {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 15000);
function md(text) {
    var esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    esc = esc.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
    esc = esc.replace(/^- (.*)$/gm, '• $1');
    return esc;
}

// ---------------- encrypted data from GitHub ----------------
function b64ToBytes(b64) {
    var bin = atob(b64.replace(/\s/g, ''));
    var a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
}
function hexToBytes(hex) {
    var a = new Uint8Array(hex.length / 2);
    for (var i = 0; i < a.length; i++) a[i] = parseInt(hex.substr(i * 2, 2), 16);
    return a;
}
async function fetchRemoteSummary() {
    var r = await fetch('https://api.github.com/repos/' + CFG.user + '/jarvis-data/contents/summary.enc?ref=main', {
        headers: { 'Authorization': 'token ' + CFG.gh, 'Accept': 'application/vnd.github+json' },
        cache: 'no-store'
    });
    if (!r.ok) throw new Error('GitHub ' + r.status);
    var d = await r.json();
    var enc = b64ToBytes(d.content || '');
    var iv = enc.slice(0, 12), ct = enc.slice(12);
    var key = await crypto.subtle.importKey('raw', hexToBytes(CFG.key), 'AES-GCM', false, ['decrypt']);
    var pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    return JSON.parse(new TextDecoder().decode(pt));
}

// ---------------- JARVIS face (drawn face + particles) ----------------
(function () {
    var cv = document.getElementById('faceCanvas');
    var ctx = cv.getContext('2d');
    var speakUntil = 0, thinkUntil = 0;
    window.jarvisFace = {
        speak: function (ms) { thinkUntil = 0; speakUntil = Date.now() + (ms || 2500); },
        think: function () { thinkUntil = Date.now() + 120000; },
        calm: function () { thinkUntil = 0; }
    };
    // ---- face silhouette ----
    function inFace(x, y, fcx, fcy, fw, fh) {
        var nx = (x-fcx)/fw, ny = (y-fcy)/fh;
        return (nx*nx + ny*ny < 1.0) ||
               (nx*nx/1.12 + (ny-0.08)*(ny-0.08)/0.96 < 1.0) ||
               (nx*nx/0.88 + (ny-0.52)*(ny-0.52)/0.28 < 1.0) ||
               (Math.abs(nx) < 0.20 && ny > 0.70 && ny < 1.08) ||
               (nx < -0.15 && ny > 0.82 && ny < 1.28 && (nx+0.85)*(nx+0.85)/0.55+(ny-1.0)*(ny-1.0)/0.18 < 1) ||
               (nx >  0.15 && ny > 0.82 && ny < 1.28 && (nx-0.85)*(nx-0.85)/0.55+(ny-1.0)*(ny-1.0)/0.18 < 1);
    }
    function eyeRegion(x, y, fcx, fcy, fw, fh) {
        var nx = (x-fcx)/fw, ny = (y-fcy)/fh;
        return ((nx+0.30)*(nx+0.30)/0.030 + (ny+0.18)*(ny+0.18)/0.013 < 1) ||
               ((nx-0.30)*(nx-0.30)/0.030 + (ny+0.18)*(ny+0.18)/0.013 < 1);
    }

    var cubes = [], rain = [];
    var lastW = 0, lastH = 0, initialized = false;
    // pulse state
    var pulseR = 0, pulseActive = false, pulseTimer = 0;

    function buildCubes(w, h) {
        cubes = [];
        var STEP = Math.max(7, Math.round(w / 46));
        var fcx = w*0.5, fcy = h*0.42, fw = w*0.34, fh = h*0.44;
        for (var y = 8; y < h*0.96; y += STEP) {
            for (var x = 8; x < w-4; x += STEP) {
                if (!inFace(x, y, fcx, fcy, fw, fh)) continue;
                var nx = (x-fcx)/fw, ny = (y-fcy)/fh;
                var dist  = Math.sqrt(nx*nx + ny*ny);
                var depth = Math.max(0.1, 1.0 - dist*0.55);
                var eb    = eyeRegion(x, y, fcx, fcy, fw, fh) ? 1.0 : 0.0;
                var rBias = (x - w*0.5) / (w*0.5);
                var dChance = 0.10 + Math.max(0, rBias)*0.62 + Math.max(0, -ny)*0.15;
                var disp  = Math.random() < dChance;
                cubes.push({
                    tx: x, ty: y, x: x+(Math.random()-0.5)*120, y: y+(Math.random()-0.5)*120,
                    vx: 0, vy: 0, depth: depth, eb: eb, disp: disp,
                    dAngle: Math.random()*Math.PI*2, dDist: 55+Math.random()*190,
                    phase: Math.random()*Math.PI*2, fSpd: 0.35+Math.random()*0.55,
                    t: Math.random()*80, size: STEP*0.80, cShift: Math.random()*25,
                    distToCenter: dist
                });
            }
        }
        cubes.sort(function(a,b){ return a.depth - b.depth; });
        // rain drops
        rain = [];
        for (var i = 0; i < 28; i++) {
            rain.push({ x: Math.random()*w, y: Math.random()*h,
                        spd: 60+Math.random()*120, len: 8+Math.random()*28,
                        bright: 0.12+Math.random()*0.28 });
        }
        initialized = true;
    }

    function drawCube(x, y, s, depth, eb, alpha, cs, scanBoost, pulseBoost) {
        var side = s*0.36, d = depth, e = eb;
        var boost = scanBoost + pulseBoost + e*0.55;
        var r = Math.min(255, Math.floor(12  + d*30  + boost*90  + cs*0.3));
        var g = Math.min(255, Math.floor(50  + d*100 + boost*110 + cs*0.15));
        var b = Math.min(255, Math.floor(130 + d*100 + boost*60));
        var a = Math.min(1, alpha + boost*0.4);
        ctx.globalAlpha = a;
        ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
        ctx.fillRect(x-s/2, y-s/2, s, s);
        ctx.fillStyle = 'rgba('+Math.min(255,r+35)+','+Math.min(255,g+55)+','+Math.min(255,b+35)+','+(a*0.75)+')';
        ctx.beginPath(); ctx.moveTo(x-s/2,y-s/2); ctx.lineTo(x-s/2+side,y-s/2-side*0.52);
        ctx.lineTo(x+s/2+side,y-s/2-side*0.52); ctx.lineTo(x+s/2,y-s/2); ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba('+Math.max(0,r-25)+','+Math.max(0,g-38)+','+Math.max(0,b-18)+','+(a*0.88)+')';
        ctx.beginPath(); ctx.moveTo(x+s/2,y-s/2); ctx.lineTo(x+s/2+side,y-s/2-side*0.52);
        ctx.lineTo(x+s/2+side,y+s/2-side*0.52); ctx.lineTo(x+s/2,y+s/2); ctx.closePath(); ctx.fill();
        if (s > 7) {
            ctx.globalAlpha = a*0.22;
            ctx.strokeStyle = 'rgba('+Math.min(255,r+70)+','+Math.min(255,g+90)+',255,1)';
            ctx.lineWidth = 0.4; ctx.strokeRect(x-s/2, y-s/2, s, s);
        }
    }

    function draw() {
        requestAnimationFrame(draw);
        if (!document.getElementById('page-chat').classList.contains('active')) return;
        var w = cv.clientWidth, h = cv.clientHeight, dpr = window.devicePixelRatio || 1;
        if (!w || !h) return;
        var pw = Math.round(w*dpr), ph = Math.round(h*dpr);
        if (cv.width !== pw) { cv.width = pw; cv.height = ph; }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (!initialized || w !== lastW || h !== lastH) { buildCubes(w, h); lastW = w; lastH = h; }

        var t = Date.now()/1000, dt = 0.016;
        var now = Date.now();
        var speaking = now < speakUntil, thinking = now < thinkUntil;
        var fcx = w*0.5, fcy = h*0.42, fw = w*0.34, fh = h*0.44;
        var maxFaceR = Math.min(w,h)*0.46;

        // pulse trigger every ~5s
        pulseTimer += dt;
        if (pulseTimer > 5.0) { pulseTimer = 0; pulseActive = true; pulseR = 0; }
        if (pulseActive) {
            pulseR += dt * maxFaceR * 1.1;
            if (pulseR > maxFaceR * 1.6) pulseActive = false;
        }

        // glitch: random brief band shift
        var glitching = Math.sin(t*11.3)*Math.sin(t*7.7) > 0.94;
        var glitchY  = fcy - fh*0.3 + Math.random()*fh*0.9;
        var glitchH  = 6 + Math.random()*18;
        var glitchOX = glitching ? (Math.random()-0.5)*28 : 0;

        // scan beam Y (sweeps top→bottom of face every ~3s)
        var scanY = fcy - fh + ((t % 3.0) / 3.0) * fh * 2.2;

        // breathing scale
        var breath = 1.0 + Math.sin(t*0.75)*0.011;

        // --- clear ---
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a0e17';
        ctx.fillRect(0, 0, w, h);

        // --- matrix rain ---
        rain.forEach(function(r) {
            r.y += r.spd * dt;
            if (r.y > h + r.len) r.y = -r.len;
            var rg = ctx.createLinearGradient(r.x, r.y-r.len, r.x, r.y);
            rg.addColorStop(0, 'rgba(0,212,255,0)');
            rg.addColorStop(1, 'rgba(0,212,255,'+r.bright+')');
            ctx.globalAlpha = 1; ctx.strokeStyle = rg; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(r.x, r.y-r.len); ctx.lineTo(r.x, r.y); ctx.stroke();
        });

        // --- cubes ---
        cubes.forEach(function(p) {
            p.t += 0.018;
            var floatX = Math.sin(p.t*p.fSpd + p.phase)*2.2;
            var floatY = Math.cos(p.t*p.fSpd*0.75 + p.phase+1)*1.6;

            if (speaking) {
                var ny = (p.ty - fcy)/fh;
                if (ny > 0.36 && ny < 0.68) floatY += Math.sin(t*15 + p.phase*2)*4.5;
            }

            var dWave = (Math.sin(p.t*0.28 + p.phase*0.55)+1)/2;
            // apply breath scale to target position
            var tx = fcx + (p.tx - fcx)*breath + floatX;
            var ty = fcy + (p.ty - fcy)*breath + floatY;
            var alpha = 0.60 + p.depth*0.40;

            if (p.disp) {
                tx += Math.cos(p.dAngle)*p.dDist*dWave;
                ty += Math.sin(p.dAngle)*p.dDist*dWave;
                alpha *= (1 - dWave*0.65);
            }

            // glitch band offset
            if (glitching && p.ty > glitchY && p.ty < glitchY+glitchH) {
                tx += glitchOX;
                alpha = Math.min(1, alpha * 1.6);
            }

            // pulse shockwave — push cubes at wavefront
            if (pulseActive) {
                var pdx = p.tx - fcx, pdy = p.ty - fcy;
                var pd  = Math.sqrt(pdx*pdx + pdy*pdy);
                var wave = 1 - Math.min(1, Math.abs(pd - pulseR) / (maxFaceR*0.12));
                if (wave > 0) { tx += (pdx/Math.max(1,pd))*wave*22; ty += (pdy/Math.max(1,pd))*wave*22; }
            }

            var pull = thinking ? 0.036 : 0.072;
            p.vx += (tx-p.x)*pull; p.vy += (ty-p.y)*pull;
            p.vx *= 0.74; p.vy *= 0.74;
            p.x += p.vx; p.y += p.vy;

            // scan beam proximity boost
            var scanBoost = Math.max(0, 1 - Math.abs(p.y - scanY)/16) * 0.75;
            // pulse wave glow boost
            var pulseBoost = 0;
            if (pulseActive) {
                var pdx2 = p.x - fcx, pdy2 = p.y - fcy;
                var pd2 = Math.sqrt(pdx2*pdx2+pdy2*pdy2);
                pulseBoost = Math.max(0, 1 - Math.abs(pd2-pulseR)/(maxFaceR*0.14)) * 0.6;
            }

            drawCube(p.x, p.y, p.size, p.depth, p.eb, Math.max(0.05, alpha), p.cShift, scanBoost, pulseBoost);
        });

        // --- scan beam glow overlay ---
        if (scanY > fcy - fh && scanY < fcy + fh) {
            ctx.globalAlpha = 0.12;
            var sg = ctx.createLinearGradient(fcx-fw, scanY, fcx+fw, scanY);
            sg.addColorStop(0,'rgba(0,212,255,0)'); sg.addColorStop(0.5,'rgba(0,212,255,1)'); sg.addColorStop(1,'rgba(0,212,255,0)');
            ctx.fillStyle = sg; ctx.fillRect(fcx-fw, scanY-2, fw*2, 4);
        }

        // --- eye glow overlays ---
        var eyePulse = 0.18 + 0.10*Math.sin(t*2.8);
        [fcx - fw*0.30, fcx + fw*0.30].forEach(function(ex) {
            var ey = fcy - fh*0.18, er = fw*0.13;
            var eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, er*2.2);
            eg.addColorStop(0, 'rgba(180,240,255,'+eyePulse+')');
            eg.addColorStop(0.4, 'rgba(0,212,255,'+(eyePulse*0.5)+')');
            eg.addColorStop(1, 'rgba(0,212,255,0)');
            ctx.globalAlpha = 1; ctx.fillStyle = eg;
            ctx.beginPath(); ctx.arc(ex, ey, er*2.2, 0, Math.PI*2); ctx.fill();
        });

        // --- pulse ring ---
        if (pulseActive && pulseR < maxFaceR*1.6) {
            var pa = Math.max(0, 0.5 - pulseR/(maxFaceR*1.6));
            ctx.globalAlpha = pa;
            ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(fcx, fcy, pulseR, 0, Math.PI*2); ctx.stroke();
        }

        // --- vignette ---
        ctx.globalAlpha = 1;
        var vg = ctx.createRadialGradient(w/2, h*0.42, h*0.12, w/2, h*0.42, h*0.84);
        vg.addColorStop(0,'rgba(10,14,23,0)'); vg.addColorStop(1,'rgba(10,14,23,0.78)');
        ctx.fillStyle = vg; ctx.fillRect(0,0,w,h);
    }
    draw();
})();

// ---------------- chat (direct to Groq) ----------------
var chatHistory = [];
var log = document.getElementById('chatLog');
var input = document.getElementById('chatInput');
var btn = document.getElementById('sendBtn');

function addMsg(cls, html) {
    var div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = html;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
}

function directChat(messages) {
    var cached = JSON.parse(localStorage.getItem('jarvis_summary') || 'null');
    var sys = (cached && cached.personaSystem) ||
        "You are JARVIS, Tony Stark's AI assistant. Be helpful, witty and concise. Plain simple English, short sentences. Address the user as sir. Never invent data.";
    var mem = (cached && cached.memory) || [];
    var ctrl = new AbortController();
    setTimeout(function () { ctrl.abort(); }, 25000);
    return fetch('https://api.groq.com/openai/v1/chat/completions', {
        signal: ctrl.signal,
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + CFG.groq },
        body: JSON.stringify({
            model: 'openai/gpt-oss-120b', max_tokens: 700, temperature: 0.4,
            messages: [{ role: 'system', content: sys }].concat(mem).concat(messages.slice(-12))
        })
    }).then(function (r) { return r.json(); }).then(function (d) {
        var t = d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content;
        if (!t) throw new Error((d.error && d.error.message) || 'empty reply');
        return t.trim();
    });
}

function sendMsg() {
    var text = input.value.trim();
    if (!text || btn.disabled) return;
    if (!CFG || !CFG.groq) {
        addMsg('jarvis', "I'm not set up yet, sir. At home, open the setup link in Safari once (ask Claude for it) and I'll work anywhere after that.");
        return;
    }
    input.value = '';
    addMsg('user', md(text));
    chatHistory.push({ role: 'user', content: text });
    var think = addMsg('jarvis thinking', 'Thinking, sir...');
    btn.disabled = true;
    if (window.jarvisFace) window.jarvisFace.think();
    directChat(chatHistory).then(function (reply) {
        think.remove();
        chatHistory.push({ role: 'assistant', content: reply });
        addMsg('jarvis', md(reply));
        if (window.jarvisFace) window.jarvisFace.speak(Math.min(9000, 1200 + reply.length * 35));
    }).catch(function (e) {
        think.remove();
        addMsg('jarvis', "I can't reach my systems, sir — check your internet connection. (" + (e && e.message ? e.message : 'unknown') + ")");
    }).finally(function () { btn.disabled = false; });
}
document.getElementById('chatBar').addEventListener('submit', function (e) {
    e.preventDefault();
    sendMsg();
});
window.addEventListener('error', function (e) {
    // Browsers report masked/cross-origin errors as just "Script error." with no
    // detail — nothing actionable, so don't alarm the user with those.
    var m = e.message || '';
    if (!m || /^Script error\.?$/i.test(m)) return;
    addMsg('jarvis', '⚠ App error, sir: ' + m);
});
window.addEventListener('unhandledrejection', function (e) {
    var m = (e.reason && e.reason.message) || '';
    if (!m) return;
    addMsg('jarvis', '⚠ App error, sir: ' + m);
});

// ---------------- markets + brief rendering ----------------
function drawSpark(snaps) {
    var c = document.getElementById('spark');
    var dpr = window.devicePixelRatio || 1;
    var w = c.clientWidth, h = 90;
    c.width = w * dpr; c.height = h * dpr;
    var ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    if (!snaps || snaps.length < 2) return;
    var vals = snaps.map(function (s) { return s.equity; });
    var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
    var pad = (max - min) * 0.1 || 1;
    min -= pad; max += pad;
    function x(i) { return (i / (vals.length - 1)) * (w - 8) + 4; }
    function y(v) { return h - 8 - ((v - min) / (max - min)) * (h - 16); }
    ctx.beginPath();
    ctx.moveTo(x(0), y(vals[0]));
    for (var i = 1; i < vals.length; i++) ctx.lineTo(x(i), y(vals[i]));
    ctx.lineTo(x(vals.length - 1), h); ctx.lineTo(x(0), h); ctx.closePath();
    var g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, 'rgba(0,212,255,0.25)'); g.addColorStop(1, 'rgba(0,212,255,0)');
    ctx.fillStyle = g; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x(0), y(vals[0]));
    for (var j = 1; j < vals.length; j++) ctx.lineTo(x(j), y(vals[j]));
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath();
    ctx.arc(x(vals.length - 1), y(vals[vals.length - 1]), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#00d4ff'; ctx.fill();
}

// theme set in the Mac's JARVIS Studio, delivered inside the synced data
var themeStyleEl = document.createElement('style');
document.head.appendChild(themeStyleEl);
function applyTheme(t) {
    if (!t) return;
    var r = document.documentElement.style;
    if (t.accent) {
        r.setProperty('--cyan', t.accent);
        r.setProperty('--cyan-dim', t.accent + '55');
        r.setProperty('--cyan-faint', t.accent + '22');
    }
    if (t.bg) r.setProperty('--bg', t.bg);
    if (t.panel) r.setProperty('--panel', t.panel);
    document.body.style.fontFamily = (t.font === 'mono') ? "'Courier New', monospace" : "-apple-system, 'Helvetica Neue', sans-serif";
    var rad = (typeof t.radius === 'number') ? t.radius : 12;
    var scale = (typeof t.fontScale === 'number') ? t.fontScale : 1;
    themeStyleEl.textContent =
        '.card{border-radius:' + rad + 'px}.msg{border-radius:' + Math.max(4, rad) + 'px}' +
        '#chatInput,#sendBtn{border-radius:' + Math.max(8, rad + 8) + 'px}' +
        '.msg{font-size:' + Math.round(15 * scale) + 'px}' +
        '#briefBody{font-size:' + Math.round(14 * scale) + 'px}' +
        '.big{font-size:' + Math.round(32 * scale) + 'px}' +
        '.trow{font-size:' + Math.round(13 * scale) + 'px}';
    var dot = document.getElementById('headerDot');
    if (dot) dot.style.boxShadow = (t.glow === false) ? 'none' : '0 0 8px var(--cyan)';
    var face = document.getElementById('faceCanvas');
    if (face) face.style.display = (t.face === false) ? 'none' : '';
    if (t.title) {
        document.getElementById('headerTitle').textContent = t.title;
        document.title = t.title.replace(/\./g, '');
    }
    var tabs = t.tabs || {};
    document.querySelectorAll('.tab').forEach(function (el) {
        el.style.display = (tabs[el.dataset.page] === false) ? 'none' : '';
    });
    var cardMap = { portfolio: 'card-portfolio', tally: 'card-tally', alert: 'alertCard', brief: 'card-brief' };
    var hidden = t.hidden || {};
    Object.keys(cardMap).forEach(function (k) {
        var el = document.getElementById(cardMap[k]);
        if (el) el.dataset.userHidden = hidden[k] ? '1' : '';
        if (el && hidden[k]) el.style.display = 'none';
        else if (el && k !== 'alert') el.style.display = '';
    });
    var order = t.order || {};
    ['markets', 'brief'].forEach(function (tab) {
        (order[tab] || []).forEach(function (k) {
            var el = document.getElementById(cardMap[k]);
            if (el && el.parentNode) el.parentNode.appendChild(el);
        });
    });
}
applyTheme(JSON.parse(localStorage.getItem('jarvis_summary') || 'null') && JSON.parse(localStorage.getItem('jarvis_summary')).theme);

function renderSummary(d, fromCache) {
    if (d.theme) applyTheme(d.theme);
    var last = d.snapshots && d.snapshots[d.snapshots.length - 1];
    if (last) {
        document.getElementById('equity').textContent = '$' + Number(last.equity).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        var up = last.dayPnl >= 0;
        var pnlEl = document.getElementById('dayPnl');
        pnlEl.textContent = (up ? '▲ +' : '▼ ') + '$' + Math.abs(last.dayPnl).toFixed(2) + ' (' + (up ? '+' : '') + last.dayPnlPct + '%)';
        pnlEl.className = 'pnl ' + (up ? 'up' : 'down');
        document.getElementById('asOf').textContent = 'as of ' + last.date;
        drawSpark(d.snapshots);
    }
    var tEl = document.getElementById('tally');
    tEl.innerHTML = '';
    (d.tally || []).slice().reverse().forEach(function (day) {
        var row = document.createElement('div');
        row.className = 'trow';
        var chips = day.trades.map(function (t) { return '<span class="chip ' + t + '">' + t + '</span>'; }).join('');
        var up = day.pnl >= 0;
        row.innerHTML = '<span class="d">' + day.date.slice(5) + '</span><span class="chips">' + chips + '</span>' +
            '<span class="p ' + (up ? 'up' : 'down') + '">' + (up ? '+' : '') + Number(day.pnl).toFixed(2) + '</span>';
        tEl.appendChild(row);
    });
    if (d.alert && d.alert.title && !document.getElementById('alertCard').dataset.userHidden) {
        document.getElementById('alertCard').style.display = 'block';
        document.getElementById('alertTitle').textContent = d.alert.title;
        document.getElementById('alertMeta').textContent =
            (d.alert.source || '') + (d.alert.impact ? ' · impact: ' + d.alert.impact : '');
    }
    var bw = document.getElementById('briefWhen');
    if (d.briefTime) {
        var age = Date.now() - new Date(d.briefTime).getTime();
        var days = Math.floor(age / 86400000);
        var stamp = new Date(d.briefTime).toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        bw.textContent = 'Written by the Mac: ' + stamp + (days >= 1 ? ' — ' + days + ' day' + (days > 1 ? 's' : '') + ' old' : '');
        bw.style.color = days >= 1 ? '#ffb300' : '';
    } else if (bw) { bw.textContent = ''; }
    if (d.brief) {
        var html = d.brief
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/^## (.*)$/gm, '<h2>$1</h2>')
            .replace(/^# (.*)$/gm, '<h1>$1</h1>')
            .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
            .replace(/^- (.*)$/gm, '<li>$1</li>')
            .replace(/\n\n/g, '<br>');
        document.getElementById('briefBody').innerHTML = html;
    } else {
        document.getElementById('briefBody').textContent = 'No brief in the last sync, sir.';
    }
    var when = d.updated ? new Date(d.updated).toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'unknown';
    ['mOffline', 'bOffline'].forEach(function (id) {
        var el = document.getElementById(id);
        el.textContent = (fromCache ? 'Offline — showing stored sync (' : 'Last sync from your Mac: ') + when + (fromCache ? ')' : '');
        el.style.display = 'block';
    });
}

function loadSummary() {
    if (!CFG) {
        document.getElementById('greeting').innerHTML =
            "Not set up yet, sir. While on your home Wi-Fi, open the setup link in Safari once — it hands me everything I need, then add me to your home screen from there.";
        return;
    }
    fetchRemoteSummary().then(function (d) {
        localStorage.setItem('jarvis_summary', JSON.stringify(d));
        renderSummary(d, false);
    }).catch(function () {
        var cached = JSON.parse(localStorage.getItem('jarvis_summary') || 'null');
        if (cached) renderSummary(cached, true);
    });
}
loadSummary();
setInterval(loadSummary, 120000);
